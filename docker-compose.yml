services:
  postgres:
    image: postgres:16-alpine
    container_name: sportstock-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sportstock}
      POSTGRES_USER: ${DB_USER:-sportstock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "${DB_PORT:-6432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    env_file: .env


volumes:
  postgres-data:
