spring.application.name=ingestion

spring.datasource.url=jdbc:postgresql://localhost:6432/sportstock?currentSchema=ingestion
spring.datasource.username=sportstock
spring.datasource.password=${DB_PASSWORD:localdev}

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=ingestion

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=ingestion

server.port=${SERVER_PORT:8081}

spring.config.import=optional:file:.env[.properties]