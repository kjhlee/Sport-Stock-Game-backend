spring.application.name=ingestion

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6432}/${DB_NAME:sportstock}?currentSchema=ingestion
spring.datasource.username=${DB_USER:sportstock}
spring.datasource.password=${DB_PASSWORD:localdev}

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=ingestion

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=ingestion
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.jpa.open-in-view=false

server.port=${INGESTION_SERVICE_PORT:8090}

jwt.secret=${JWT_SECRET_KEY}

spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

espn.api.site-base-url=https://site.api.espn.com/apis/site/v2
espn.api.core-base-url=https://sports.core.api.espn.com/v2
espn.api.fantasy-base-url=https://lm-api-reads.fantasy.espn.com/apis/v3/games/ffl

espn.api.sport=football
espn.api.league=nfl
espn.api.default-athlete-page-size=100
espn.api.default-roster-limit=200
espn.api.rate-limit-delay-ms=200
espn.api.max-athlete-rows-per-sync=50000
espn.api.connect-timeout-seconds=5
espn.api.read-timeout-seconds=60
espn.api.athlete-page-transaction-timeout-seconds=120

