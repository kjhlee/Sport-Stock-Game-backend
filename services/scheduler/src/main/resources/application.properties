spring.application.name=scheduler

server.port=8140

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6432}/${DB_NAME:sportstock}?currentSchema=scheduler
spring.datasource.username=${DB_USER:sportstock}
spring.datasource.password=${DB_PASSWORD:localdev}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=scheduler
spring.flyway.schemas=scheduler

spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

services.ingestion.base-url=${SERVICES_BASE_URL:http://localhost}:${INGESTION_SERVICE_PORT:8090}/api/v1/ingestion
services.stock-market.base-url=${SERVICES_BASE_URL:http://localhost}:${STOCK_MARKET_SERVICE_PORT:8130}/api/v1/stocks
services.transaction.base-url=${SERVICES_BASE_URL:http://localhost}:${TRANSACTION_SERVICE_PORT:8110}/api/v1/wallets
services.league.base-url=${SERVICES_BASE_URL:http://localhost}:${LEAGUE_SERVICE_PORT:8100}/api/v1/leagues

scheduler.weekly-lifecycle.cron=0 0 10 * * TUE
scheduler.projection-sync.cron=0 0 */3 * * *
scheduler.game-poll.interval-ms=300000
scheduler.daily-catchup.cron=0 0 6 * * *
scheduler.initial-stipend-check.cron=0 0 0 * * *
scheduler.preseason.cron=0 0 0 1 8 *
