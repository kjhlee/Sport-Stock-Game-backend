spring.application.name=stock-market-service

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6432}/${DB_NAME:sportstock}?currentSchema=market
spring.datasource.username=${DB_USER:sportstock}
spring.datasource.password=${DB_PASSWORD:localdev}

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=market

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=market
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.open-in-view=false

spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

server.port=${STOCK_MARKET_SERVICE_PORT:8130}

ingestion.api.base-url=${SERVICES_BASE_URL:http://localhost}:${INGESTION_SERVICE_PORT:8090}/api/v1/ingestion

jwt.secret=${JWT_SECRET_KEY}

pricing.smoothing-alpha=0.6
pricing.price-floor=1.00
pricing.base-prices.QB=15.00
pricing.base-prices.RB=12.00
pricing.base-prices.WR=10.00
pricing.base-prices.TE=8.00
pricing.base-prices.K=5.00
