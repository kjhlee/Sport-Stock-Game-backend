spring.application.name=transaction

server.port=${TRANSACTION_SERVICE_PORT:8110}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6432}/${DB_NAME:sportstock}?currentSchema=transaction
spring.datasource.username=${DB_USER:sportstock}
spring.datasource.password=${DB_PASSWORD:localdev}
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=transaction
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=transaction
spring.jpa.open-in-view=false
# Service integration URLs
services.league.base-url=${SERVICES_BASE_URL:http://localhost}
services.league.port=${LEAGUE_SERVICE_PORT:8100}

jwt.secret=${JWT_SECRET_KEY}

spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]