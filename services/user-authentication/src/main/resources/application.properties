spring.application.name=user-authentication

server.port=${USER_AUTH_PORT:8082}

# --- PostgreSQL connection ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6432}/${DB_NAME:sportstock}?currentSchema=users
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.default-schemas=users
spring.flyway.create-schemas=true

spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]
# --- JWT Secret Key ---
jwt.secret=${JWT_SECRET_KEY}

# --- JWT Expiration Time ----
jwt.access.expire-interval=300000
jwt.refresh.expire-interval=3600000

logging.level.org.springframework.jdbc=DEBUG
logging.level.org.flywaydb=DEBUG

