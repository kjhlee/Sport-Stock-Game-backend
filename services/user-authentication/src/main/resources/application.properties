spring.application.name=user-authentication

server.port=8082

# --- PostgreSQL connection ---
spring.datasource.url=jdbc:postgresql://localhost:5432/user-info
spring.datasource.username=postgres
# spring.datasource.password=${postpass}
spring.datasource.password=9243257

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- JWT Secret Key ---
jwt.secret=${JWT_SECRET_KEY}

# --- JWT Expiration Time ----
jwt.access.expire-interval=300000
jwt.refresh.expire-interval=3600000

